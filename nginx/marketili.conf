# Marketili — Nginx reverse proxy configuration
# Place this file at: /etc/nginx/sites-available/marketili
# Then: sudo ln -s /etc/nginx/sites-available/marketili /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - SSL certificate in place (e.g. via: sudo certbot --nginx -d yourdomain.com)
#   - Node.js server running on 127.0.0.1:5000 (NOT 0.0.0.0:5000)
#   - app.set("trust proxy", 1) set in backend/server.js (already done — TASK-02)

# ── Rate limiting zones ──────────────────────────────────────────────────────
# Shared memory zone: 10m holds ~160,000 IP states
limit_req_zone  $binary_remote_addr zone=api_zone:10m  rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — certbot populates these automatically
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── API proxy ────────────────────────────────────────────────────────────
    location /api/ {
        # Allow bursts of up to 60 requests; nodelay serves them immediately
        # rather than queuing — excess beyond burst gets 429
        limit_req  zone=api_zone burst=60 nodelay;
        limit_conn conn_zone 20;
        limit_req_status  429;
        limit_conn_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 5s;

        # Pass 429 from both Nginx and Express through unchanged
        proxy_intercept_errors off;
    }

    # ── React SPA static files ───────────────────────────────────────────────
    root /var/www/marketili/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers (belt-and-suspenders alongside Helmet) ─────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Disable server version disclosure ────────────────────────────────────
    server_tokens off;

    # ── Block common scan paths ──────────────────────────────────────────────
    location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|conf)$ {
        deny all;
    }
}
